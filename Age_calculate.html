<!DOCTYPE html>
<html>
<head>
    <title>Age Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #9face6;
            font-family: Arial, sans-serif;
        }

        .box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgb(21, 21, 245);
            width: 60%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .box h2 {
            color: white;
            margin-bottom: 20px;
        }

        .dateofbirth {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .dateofbirth input[type="date"] {
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .dateofbirth button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: white;
            color: rgb(21, 21, 245);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .dateofbirth button:hover {
            background-color: rgb(230, 230, 230);
        }

        .showage {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            width: 100%;
        }

        .age {
            width: 100px;
            height: 60px;
            background-color: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Age Calculator</h2>
        <div class="dateofbirth">
            <input type="date" class="dob">
            <button type="submit" onclick="CalculateAge()">Calculate</button>
        </div>

        <div class="showage">
            <div id="years" class="age">Years</div>
            <div id="months" class="age">Months</div>
            <div id="days" class="age">Days</div>
        </div>
    </div>

    <script>
        function CalculateAge() {
            let Birthdate = document.querySelector(".dob").value;

            if (!Birthdate) {
                alert("Please select your date of birth!");
                return;
            }

            let dateobj = new Date(Birthdate);
            let currentdate = new Date();

            let year = currentdate.getFullYear() - dateobj.getFullYear();
            let month = currentdate.getMonth() - dateobj.getMonth();
            let days = currentdate.getDate() - dateobj.getDate();

            if (month < 0 || (month === 0 && days < 0)) {
                year--;
                month += 12;
            }

            if (days < 0) {
                let prevMonth = new Date(currentdate.getFullYear(), currentdate.getMonth(), 0).getDate();
                days += prevMonth;
                month--;
                console.log(prevMonth);
            }
            
            document.getElementById("years").innerHTML = `<h6>${year} Years</h6>`;
            document.getElementById("months").innerHTML = `<h6>${month} Months</h6>`;
            document.getElementById("days").innerHTML = `<h6>${days} Days</h6>`;
        }
    </script>
</body>
</html>
